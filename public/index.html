<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-bg" id="appBg"></div>

    <div class="container">
        <!-- Search -->
        <div class="search-row">
            <div class="search-pill-wrapper">
                <div class="search-pill">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="cityInput" placeholder="Search city…" value="London" autocomplete="off">
                    <button id="searchBtn">Go</button>
                </div>
                <div id="suggestions" class="suggestions hidden"></div>
            </div>
            <button id="toggleUnit" class="unit-pill"><span class="unit-label">°F</span></button>
        </div>

        <div id="error" class="error-banner hidden"></div>

        <!-- Current weather -->
        <div id="currentWeather" class="glass-card liquid-glass current-card hidden">
            <div class="current-top">
                <div class="location-block">
                    <div id="cityName" class="city-name">—</div>
                    <div id="regionName" class="region-name">—</div>
                    <div id="lastUpdated" class="last-updated">—</div>
                </div>
                <div id="weatherIcon" class="weather-icon"></div>
            </div>
            <div class="temp-row">
                <span id="temperature" class="temp-value">—</span>
                <span id="tempUnit" class="temp-unit">°C</span>
            </div>
            <div id="condition" class="condition-text">—</div>

            <div class="details-grid">
                <div class="detail-chip">
                    <span class="detail-label">Feels like</span>
                    <span id="feelsLike" class="detail-value">—</span>
                </div>
                <div class="detail-chip">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity" class="detail-value">—</span>
                </div>
                <div class="detail-chip">
                    <span class="detail-label">Wind</span>
                    <span id="wind" class="detail-value">—</span>
                </div>
                <div class="detail-chip">
                    <span class="detail-label">UV Index</span>
                    <span id="uvIndex" class="detail-value">—</span>
                </div>
            </div>
        </div>

        <!-- Forecast -->
        <div id="forecast" class="hidden">
            <div class="section-label">3-Day Forecast</div>
            <div class="forecast-scroll"><div id="forecastDays" class="forecast-row"></div></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
